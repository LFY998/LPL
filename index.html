<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>专注时钟 - 手机版</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { 
        background-color: #ffffff; 
        color: #333; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: flex-start; 
        min-height: 100vh; 
        padding: 0; 
        overflow-x: hidden; 
    }

    /* --- 顶部北京时间 --- */
    .top-time {
        width: 100%;
        text-align: center;
        font-size: 16px;
        color: #333;
        padding: 10px 0;
        background: #f0f2f5;
        border-bottom: 1px solid #ddd;
        font-weight: bold;
    }

    /* --- 计时器容器 --- */
    .timer-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 10px;
        width: 100%;
        flex: 1;
        justify-content: center;
    }
    
    .timer-circle {
        width: 70vw;
        height: 70vw;
        max-width: 280px;
        max-height: 280px;
        position: relative;
    }
    
    .circle-bg { fill: none; stroke: #e8edf0; stroke-width: 8; }
    .circle-progress { 
        fill: none; 
        stroke: #55626b; 
        stroke-width: 8; 
        stroke-linecap: round; 
        stroke-dasharray: 942; 
        stroke-dashoffset: 0; 
        transform: rotate(-90deg); 
        transform-origin: center; 
        transition: stroke-dashoffset 1s linear; 
    }
    
    .time-display { 
        position: absolute; 
        top: 50%; 
        left: 50%; 
        transform: translate(-50%, -50%); 
        font-size: 60px;
        font-weight: 700; 
        color: #000; 
    }

    /* --- 控制按钮组 --- */
    .controls {
        display: flex;
        gap: 20px;
        margin: 20px 0;
        justify-content: center;
    }
    
    .btn { 
        border: none; 
        border-radius: 50%; 
        font-size: 24px; 
        cursor: pointer; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        transition: all 0.3s ease; 
        min-width: 100px; 
        min-height: 100px; 
        padding: 10px;
        background: #f8f9fa;
        border: 1px solid #eee;
    }
    
    .btn-pause { background-color: #55626b; color: white; }
    .btn-reset, .btn-next { background-color: #e8edf0; color: #55626b; }
    .btn:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }

    /* --- 设置区域 --- */
    .toggle-settings {
        background: none;
        border: none;
        color: #666;
        font-size: 14px;
        margin: 10px 0;
        cursor: pointer;
        text-decoration: underline;
    }

    .settings-container {
        width: 100%;
        padding: 15px;
        background: #ffffff;
        border-top: 1px solid #eee;
        display: none; /* 默认隐藏 */
    }
    
    .quick-presets { 
        display: flex; 
        gap: 10px; 
        flex-wrap: wrap; 
        justify-content: center; 
        margin-bottom: 15px;
    }
    
    .preset-btn { 
        background-color: #f0f2f5; 
        border: 1px solid #ddd; 
        border-radius: 20px; 
        padding: 8px 16px; 
        font-size: 16px; 
        color: #333; 
        cursor: pointer; 
        min-width: auto;
        flex: 1 1 auto;
    }
    
    .preset-btn.active {
        background-color: #55626b;
        color: white;
        border-color: #55626b;
    }
    
    .settings { 
        display: flex; 
        align-items: center; 
        gap: 10px; 
        justify-content: center; 
        flex-wrap: wrap; 
    }
    
    .settings input { 
        width: 60px; 
        padding: 8px; 
        border: 1px solid #ddd; 
        border-radius: 8px; 
        font-size: 18px; 
        text-align: center; 
    }
    
    .btn-apply { 
        padding: 8px 16px; 
        font-size: 16px; 
        background-color: #55626b; 
        color: white; 
        border: none;
        border-radius: 8px; 
        cursor: pointer;
    }

    /* 响铃动画 */
    .ringing { animation: pulse 1s infinite; }
    @keyframes pulse { 
        0% { transform: scale(1) rotate(-5deg); } 
        50% { transform: scale(1.08) rotate(5deg); } 
        100% { transform: scale(1) rotate(-5deg); } 
    }
</style>
</head>
<body>

    <!-- 顶部北京时间 -->
    <div class="top-time" id="beijingTime">加载中...</div>

    <!-- 核心计时器与按钮 -->
    <div class="timer-container">
        <div class="timer-circle" id="timerCircle">
            <svg width="100%" height="100%" viewBox="0 0 320 320">
                <circle class="circle-bg" cx="160" cy="160" r="150"></circle>
                <circle class="circle-progress" cx="160" cy="160" r="150"></circle>
            </svg>
            <div class="time-display" id="timeDisplay">20:00</div>
        </div>

        <div class="controls">
            <button class="btn btn-pause" id="pauseBtn">
                <svg id="icon-pause" style="width: 40px; height: 40px; fill: currentColor;" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path></svg>
                <svg id="icon-play" style="display: none; width: 40px; height: 40px; fill: currentColor;" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
            </button>
            <button class="btn btn-reset" id="resetBtn">
                <svg style="width: 40px; height: 40px; fill: currentColor;" viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"></path></svg>
            </button>
            <button class="btn btn-next" id="nextBtn">
                <svg id="icon-bell" style="width: 40px; height: 40px; fill: currentColor;" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"></path></svg>
                <svg id="icon-stop" style="display: none; width: 40px; height: 40px; fill: currentColor;" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"></path></svg>
            </button>
        </div>

        <!-- 展开/收起设置按钮 -->
        <button class="toggle-settings" id="toggleSettings">▼ 高级设置 (点击展开)</button>
    </div>

    <!-- 设置区域 (默认隐藏) -->
    <div class="settings-container" id="settingsPanel">
        <div class="quick-presets">
            <button class="preset-btn active" onclick="setPreset(10)">10分</button>
            <button class="preset-btn" onclick="setPreset(20)">20分</button>
            <button class="preset-btn" onclick="setPreset(30)">30分</button>
            <button class="preset-btn" onclick="setPreset(40)">40分</button>
        </div>
        <div class="settings">
            <label>自定义(分):</label>
            <input type="number" id="timeInput" value="20" min="1" max="120">
            <button class="btn-apply" id="applyBtn">应用</button>
        </div>
    </div>

    <script>
        // --- 1. 北京时间逻辑 (已修复ID) ---
        function updateBeijingTime() {
            const now = new Date();
            // 强制显示北京时间格式
            const options = { 
                timeZone: 'Asia/Shanghai',
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            };
            const timeString = new Intl.DateTimeFormat('zh-CN', options).format(now);
            document.getElementById('beijingTime').textContent = '北京时间: ' + timeString;
        }
        setInterval(updateBeijingTime, 1000);
        updateBeijingTime(); // 初始化

        // --- 2. 计时器核心逻辑 ---
        let defaultTime = 20 * 60;
        let currentTime = defaultTime;
        let isRunning = false;
        let timer = null;
        let isRinging = false;

        // 获取DOM元素 (确保ID与HTML一致)
        const timeDisplay = document.getElementById('timeDisplay');
        const circleProgress = document.querySelector('.circle-progress');
        const pauseBtn = document.getElementById('pauseBtn');
        const iconPause = document.getElementById('icon-pause');
        const iconPlay = document.getElementById('icon-play');
        const resetBtn = document.getElementById('resetBtn');
        const nextBtn = document.getElementById('nextBtn');
        const iconBell = document.getElementById('icon-bell');
        const iconStop = document.getElementById('icon-stop');
        const timeInput = document.getElementById('timeInput');
        const applyBtn = document.getElementById('applyBtn');
        const timerCircle = document.getElementById('timerCircle');
        const presetBtns = document.querySelectorAll('.preset-btn');

        // 音频上下文
        let audioCtx = null;
        let oscillator = null;

        // 格式化时间
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // 更新进度环
        function updateProgress() {
            const progress = (currentTime / defaultTime);
            const offset = 942 * (1 - progress);
            circleProgress.style.strokeDashoffset = offset;
        }

        // 播放声音
        function playAlarmSound() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
        }

        // 停止声音
        function stopAlarmSound() {
            if (oscillator) {
                oscillator.stop();
                oscillator.disconnect();
                oscillator = null;
            }
        }

        // 开始计时
        function startTimer() {
            if (isRinging) return;
            timer = setInterval(() => {
                if (currentTime > 0) {
                    currentTime--;
                    timeDisplay.textContent = formatTime(currentTime);
                    updateProgress();
                } else {
                    triggerAlarm();
                }
            }, 1000);
        }

        // 触发闹钟
        function triggerAlarm() {
            clearInterval(timer);
            isRunning = false;
            isRinging = true;
            timerCircle.classList.add('ringing');
            timeDisplay.style.color = '#ff4757';
            playAlarmSound();
            updatePauseButton();
        }

        // 停止闹钟
        function stopAlarm() {
            isRinging = false;
            timerCircle.classList.remove('ringing');
            timeDisplay.style.color = '#000';
            stopAlarmSound();
            iconBell.style.display = 'block';
            iconStop.style.display = 'none';
            nextBtn.onclick = stopAlarm;
        }

        // 更新按钮视觉状态
        function updatePauseButton() {
            if (isRinging) {
                pauseBtn.classList.remove('paused');
                iconPause.style.display = 'block';
                iconPlay.style.display = 'none';
                iconBell.style.display = 'none';
                iconStop.style.display = 'block';
            } else if (isRunning) {
                pauseBtn.classList.remove('paused');
                iconPause.style.display = 'block';
                iconPlay.style.display = 'none';
            } else {
                pauseBtn.classList.add('paused');
                iconPause.style.display = 'none';
                iconPlay.style.display = 'block';
            }
        }

        // 设置时间
        function setTime(minutes) {
            defaultTime = minutes * 60;
            currentTime = defaultTime;
            timeDisplay.textContent = formatTime(currentTime);
            updateProgress();
            clearInterval(timer);
            isRunning = false;
            if(isRinging) stopAlarm();
            updatePauseButton();
        }

        // 快捷按钮功能 (修复了active状态逻辑)
        function setPreset(minutes) {
            setTime(minutes);
            timeInput.value = minutes;
            // 移除所有active
            presetBtns.forEach(btn => btn.classList.remove('active'));
            // 给当前按钮加active (这里简单处理，实际根据传入参数匹配)
            // 为了简化，我们只在预设点击时标记，或者在setTime里通过DOM操作比较难，这里建议点击时直接标记
            // 由于onclick直接调用，我们手动在调用处处理了active，这里主要负责逻辑
        }

        // --- 3. 新增：设置面板控制逻辑 (已修复) ---
        const toggleBtn = document.getElementById('toggleSettings');
        const settingsPanel = document.getElementById('settingsPanel');

        toggleBtn.addEventListener('click', function() {
            if (settingsPanel.style.display === 'block') {
                settingsPanel.style.display = 'none';
                toggleBtn.textContent = '▼ 高级设置 (点击展开)';
            } else {
                settingsPanel.style.display = 'block';
                toggleBtn.textContent = '▲ 收起设置';
            }
        });

        // --- 4. 原有事件监听 ---
        pauseBtn.addEventListener('click', () => {
            if (isRinging) {
                stopAlarm();
                return;
            }
            if (isRunning) {
                clearInterval(timer);
                isRunning = false;
            } else {
                startTimer();
                isRunning = true;
            }
            updatePauseButton();
        });

        resetBtn.addEventListener('click', () => {
            if (isRinging) { stopAlarm(); }
            clearInterval(timer);
            isRunning = false;
            currentTime = defaultTime;
            timeDisplay.textContent = formatTime(currentTime);
            timeDisplay.style.color = '#000';
            updateProgress();
            updatePauseButton();
        });

        nextBtn.addEventListener('click', stopAlarm);

        applyBtn.addEventListener('click', () => {
            const minutes = parseInt(timeInput.value);
            if (minutes > 0) {
                // 清除快捷按钮的选中状态
                presetBtns.forEach(btn => btn.classList.remove('active'));
                setTime(minutes);
            }
        });

        // --- 5. 初始化 ---
        updateProgress(); 
        updatePauseButton(); 
        // 默认设置20分钟，并标记第一个按钮
        setTime(20);
        if (presetBtns[0]) presetBtns[0].classList.add('active');
    </script>
</body>
</html>
